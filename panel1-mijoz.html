<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0">
<title>Oshxona — Menyu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --cobalt:#1E4F6B;
    --cobalt-deep:#123246;
    --teal:#2E8C8A;
    --teal-light:#DCEFEE;
    --gold:#E3A73E;
    --gold-deep:#C98A22;
    --clay:#B75B3A;
    --cream:#FBF6EC;
    --cream-dim:#F1EADA;
    --ink:#202623;
    --ink-soft:#4B5450;
    --line: rgba(32,38,35,0.12);
    --radius-lg: 22px;
    --radius-md: 14px;
    --radius-sm: 9px;
    --shadow-card: 0 6px 20px rgba(18,50,70,0.10);
    --shadow-modal: 0 20px 60px rgba(18,50,70,0.35);
    --font-display: 'Fraunces', serif;
    --font-body: 'Manrope', sans-serif;
    --logo-size: 40px;
    --fs-scale: 1;
    --bg: var(--cream);
    --bg-panel: #ffffff;
    --text: var(--ink);
    --text-soft: var(--ink-soft);
    --header-bg: rgba(251,246,236,0.92);
  }
  [data-theme="dark"]{
    --bg:#12201E;
    --bg-panel:#17302D;
    --text:#EFEAE0;
    --text-soft:#B9C2BE;
    --line: rgba(239,234,224,0.12);
    --header-bg: rgba(18,32,30,0.92);
    --cream-dim:#1D3733;
    --shadow-card: 0 6px 20px rgba(0,0,0,0.35);
  }
  *{box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:var(--font-body);
    font-size:calc(16px * var(--fs-scale));
    line-height:1.5;
    transition:background .3s ease, color .3s ease;
    -webkit-font-smoothing:antialiased;
  }
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001ms !important; transition-duration:0.001ms !important;}
  }
  button{font-family:inherit; cursor:pointer;}
  input{font-family:inherit;}
  a{color:inherit;}
  .visually-hidden{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;}

  /* ---------- HEADER ---------- */
  header.top{
    position:sticky; top:0; z-index:40;
    background:var(--header-bg);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
    padding:10px 14px;
  }
  .top-row{
    display:flex; align-items:center; gap:10px; max-width:1080px; margin:0 auto;
  }
  .brand{
    display:flex; align-items:center; gap:10px; flex-shrink:0; min-width:0;
    background:none; border:none; padding:0; color:inherit;
  }
  .brand img{ height:var(--logo-size); width:auto; display:block; border-radius:8px;}
  .brand .logo-mark{
    height:var(--logo-size); width:var(--logo-size);
    border-radius:10px;
    background:linear-gradient(145deg,var(--cobalt),var(--teal));
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-family:var(--font-display); font-weight:700;
    font-size:calc(var(--logo-size) * 0.42);
    flex-shrink:0;
  }
  .brand .site-name{
    font-family:var(--font-display); font-weight:600;
    font-size:1.15rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    max-width:38vw;
  }
  .search-wrap{
    flex:1; position:relative; min-width:0;
  }
  .search-wrap input{
    width:100%; padding:11px 42px 11px 16px;
    border-radius:999px; border:1.5px solid var(--line);
    background:var(--bg-panel); color:var(--text);
    font-size:0.95rem; outline:none;
    transition:border-color .2s ease, box-shadow .2s ease;
  }
  .search-wrap input:focus{ border-color:var(--teal); box-shadow:0 0 0 3px rgba(46,140,138,0.18); }
  .search-wrap svg{
    position:absolute; right:14px; top:50%; transform:translateY(-50%);
    width:18px; height:18px; opacity:0.55; pointer-events:none;
  }
  .lang-select{
    border:1.5px solid var(--line); background:var(--bg-panel); color:var(--text);
    border-radius:999px; padding:9px 12px; font-size:0.85rem; font-weight:700;
    flex-shrink:0;
  }
  .menu-btn{
    background:var(--bg-panel); border:1.5px solid var(--line); border-radius:12px;
    width:42px; height:42px; display:flex; align-items:center; justify-content:center;
    flex-shrink:0; position:relative;
  }
  .menu-btn svg{width:20px; height:20px;}

  /* dropdown menu */
  .dropdown{
    position:absolute; top:calc(100% + 8px); right:14px; z-index:50;
    background:var(--bg-panel); border:1px solid var(--line); border-radius:var(--radius-md);
    box-shadow:var(--shadow-card); min-width:220px; overflow:hidden;
    opacity:0; transform:translateY(-6px) scale(0.98); pointer-events:none;
    transition:opacity .18s ease, transform .18s ease;
  }
  .dropdown.open{ opacity:1; transform:translateY(0) scale(1); pointer-events:auto; }
  .dropdown button{
    display:flex; align-items:center; gap:10px; width:100%; text-align:left;
    padding:13px 16px; background:none; border:none; color:var(--text);
    font-size:0.92rem; font-weight:600; border-bottom:1px solid var(--line);
  }
  .dropdown button:last-child{border-bottom:none;}
  .dropdown button:hover{background:var(--cream-dim);}
  .dropdown .lock{margin-left:auto; opacity:0.45; font-size:0.8rem;}

  /* ---------- CATEGORY PILLS ---------- */
  .cat-row{
    max-width:1080px; margin:0 auto; padding:14px 14px 4px;
    display:flex; gap:8px; overflow-x:auto; scrollbar-width:none;
  }
  .cat-row::-webkit-scrollbar{display:none;}
  .cat-pill{
    flex-shrink:0; padding:9px 18px; border-radius:999px; border:1.5px solid var(--line);
    background:var(--bg-panel); color:var(--text-soft); font-weight:700; font-size:0.88rem;
    transition:all .18s ease; white-space:nowrap;
  }
  .cat-pill.active{ background:var(--cobalt); border-color:var(--cobalt); color:#fff; }
  .cat-pill:hover:not(.active){ border-color:var(--teal); color:var(--teal); }

  /* ---------- GRID ---------- */
  main{ max-width:1080px; margin:0 auto; padding:18px 14px 60px; }
  .section-title{
    font-family:var(--font-display); font-size:1.5rem; font-weight:600; margin:18px 4px 12px;
  }
  .empty-state{
    text-align:center; padding:60px 20px; color:var(--text-soft);
  }
  .grid{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(160px,1fr)); gap:14px;
  }
  .card{
    background:var(--bg-panel); border:1px solid var(--line); border-radius:var(--radius-lg);
    overflow:hidden; text-align:left; padding:0; color:inherit;
    box-shadow:var(--shadow-card);
    opacity:0; transform:translateY(16px);
    animation:cardIn .5s cubic-bezier(.2,.8,.2,1) forwards;
    transition:transform .2s ease, box-shadow .2s ease;
  }
  .card:hover{ transform:translateY(-4px); box-shadow:0 14px 30px rgba(18,50,70,0.16); }
  @keyframes cardIn{ to{ opacity:1; transform:translateY(0);} }
  .card .thumb{
    aspect-ratio:1/0.85; width:100%; position:relative; overflow:hidden;
    background:linear-gradient(135deg,var(--teal-light),var(--cream-dim));
    display:flex; align-items:center; justify-content:center;
  }
  .card .thumb img{ width:100%; height:100%; object-fit:cover; }
  .card .thumb svg{ width:46%; height:46%; color:var(--cobalt); opacity:0.55; }
  .card .price-badge{
    position:absolute; top:8px; right:8px; background:var(--gold);
    color:#2b1f06; font-weight:800; font-size:0.78rem; padding:5px 10px; border-radius:999px;
    box-shadow:0 3px 8px rgba(0,0,0,0.15);
  }
  .card .info{ padding:12px 13px 14px; }
  .card .name{ font-family:var(--font-display); font-weight:600; font-size:1.02rem; margin:0 0 3px; }
  .card .cat-label{ font-size:0.76rem; color:var(--text-soft); font-weight:700; text-transform:uppercase; letter-spacing:0.03em; }

  /* ---------- DETAIL MODAL ---------- */
  .overlay{
    position:fixed; inset:0; background:rgba(15,25,23,0.55); z-index:100;
    display:flex; align-items:flex-end; justify-content:center;
    opacity:0; pointer-events:none; transition:opacity .25s ease;
  }
  .overlay.open{ opacity:1; pointer-events:auto; }
  @media (min-width:640px){ .overlay{ align-items:center; } }
  .detail-sheet{
    background:var(--bg-panel); width:100%; max-width:520px; max-height:88vh; overflow-y:auto;
    border-radius:24px 24px 0 0; box-shadow:var(--shadow-modal);
    transform:translateY(30px); transition:transform .3s cubic-bezier(.2,.8,.2,1);
  }
  @media (min-width:640px){ .detail-sheet{ border-radius:24px; transform:scale(0.94) translateY(0); } }
  .overlay.open .detail-sheet{ transform:translateY(0) scale(1); }
  .detail-sheet .dimg{
    width:100%; aspect-ratio:16/10; background:linear-gradient(135deg,var(--teal-light),var(--cream-dim));
    display:flex; align-items:center; justify-content:center; position:relative;
  }
  .detail-sheet .dimg img{ width:100%; height:100%; object-fit:cover; }
  .detail-sheet .dimg svg{ width:34%; height:34%; color:var(--cobalt); opacity:0.5; }
  .detail-close{
    position:absolute; top:12px; right:12px; width:36px; height:36px; border-radius:50%;
    background:rgba(0,0,0,0.45); color:#fff; border:none; display:flex; align-items:center; justify-content:center;
  }
  .detail-body{ padding:20px 22px 26px; }
  .detail-price{
    display:inline-block; background:var(--gold); color:#2b1f06; font-weight:800;
    padding:6px 14px; border-radius:999px; font-size:0.95rem; margin-bottom:10px;
  }
  .detail-name{ font-family:var(--font-display); font-size:1.5rem; font-weight:600; margin:2px 0 8px; }
  .detail-desc{ color:var(--text-soft); font-size:0.98rem; line-height:1.6; margin-bottom:16px; }
  .voice-btn{
    display:inline-flex; align-items:center; gap:9px; background:var(--cobalt); color:#fff;
    border:none; padding:11px 18px; border-radius:999px; font-weight:700; font-size:0.9rem;
  }
  .voice-btn svg{ width:18px; height:18px; }
  .voice-btn.speaking{ background:var(--teal); }

  /* ---------- INFO NOTE (signature element) ---------- */
  .note-overlay{
    position:fixed; inset:0; background:rgba(15,25,23,0.6); z-index:120;
    display:flex; align-items:center; justify-content:center; padding:20px;
    opacity:0; pointer-events:none; transition:opacity .3s ease;
  }
  .note-overlay.open{ opacity:1; pointer-events:auto; }
  .note-card{
    position:relative; width:100%; max-width:380px; background:var(--cream);
    color:#2b2620;
    border-radius:18px; padding:30px 26px 26px;
    box-shadow:var(--shadow-modal);
    transform:rotate(-1.2deg) scale(0.9); opacity:0;
    transition:transform .35s cubic-bezier(.2,.8,.2,1), opacity .3s ease;
    background-image:
      repeating-linear-gradient(to bottom, transparent, transparent 27px, rgba(30,79,107,0.07) 28px);
  }
  .note-overlay.open .note-card{ transform:rotate(0deg) scale(1); opacity:1; }
  .note-card::before{
    content:""; position:absolute; inset:8px; border-radius:12px;
    border:2px dashed rgba(30,79,107,0.35); pointer-events:none;
  }
  .note-close{
    position:absolute; top:10px; right:10px; width:32px; height:32px; border-radius:50%;
    background:rgba(30,79,107,0.1); border:none; display:flex; align-items:center; justify-content:center;
    color:var(--cobalt); font-size:1.1rem; font-weight:700;
  }
  .note-eyebrow{ font-size:0.72rem; font-weight:800; letter-spacing:0.08em; text-transform:uppercase; color:var(--teal); margin-bottom:8px;}
  .note-title{ font-family:var(--font-display); font-size:1.35rem; font-weight:600; margin:0 0 10px; }
  .note-text{ font-size:0.95rem; line-height:1.65; color:#3c352c; min-height:90px; }
  .note-nav{ display:flex; align-items:center; justify-content:space-between; margin-top:18px; }
  .note-nav-btn{
    width:38px; height:38px; border-radius:50%; border:1.5px solid rgba(30,79,107,0.3);
    background:none; display:flex; align-items:center; justify-content:center; color:var(--cobalt);
  }
  .note-nav-btn:disabled{ opacity:0.25; }
  .note-dots{ display:flex; gap:6px; }
  .note-dot{ width:6px; height:6px; border-radius:50%; background:rgba(30,79,107,0.25); }
  .note-dot.active{ background:var(--cobalt); width:16px; border-radius:3px; transition:all .2s ease;}

  /* ---------- SETTINGS PANEL ---------- */
  .settings-body{ padding:6px 4px 10px; }
  .set-row{
    display:flex; align-items:center; justify-content:space-between; padding:14px 0;
    border-bottom:1px solid var(--line);
  }
  .set-row:last-child{ border-bottom:none; }
  .set-label{ font-weight:700; font-size:0.95rem; }
  .set-sub{ font-size:0.78rem; color:var(--text-soft); margin-top:2px; }
  .toggle{
    width:50px; height:28px; border-radius:999px; background:var(--line); position:relative;
    border:none; flex-shrink:0;
  }
  .toggle::after{
    content:""; position:absolute; top:3px; left:3px; width:22px; height:22px; border-radius:50%;
    background:#fff; box-shadow:0 2px 5px rgba(0,0,0,0.2); transition:transform .2s ease;
  }
  .toggle.on{ background:var(--cobalt); }
  .toggle.on::after{ transform:translateX(22px); }
  .fs-btns{ display:flex; gap:6px; }
  .fs-btns button{
    width:34px; height:34px; border-radius:9px; border:1.5px solid var(--line); background:var(--bg-panel);
    color:var(--text); font-weight:700;
  }
  .fs-btns button.active{ background:var(--cobalt); border-color:var(--cobalt); color:#fff; }

  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--ink); color:#fff; padding:12px 20px; border-radius:999px; font-size:0.88rem;
    font-weight:600; z-index:200; opacity:0; transition:all .25s ease; pointer-events:none;
    max-width:88vw; text-align:center;
  }
  [data-theme="dark"] .toast{ background:#EFEAE0; color:#12201E; }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  .info-fab{
    position:fixed; bottom:20px; right:16px; z-index:30;
    width:48px; height:48px; border-radius:50%; background:var(--cobalt); color:#fff;
    border:none; box-shadow:0 8px 20px rgba(18,50,70,0.35); display:flex; align-items:center; justify-content:center;
    font-family:var(--font-display); font-weight:700; font-size:1.1rem;
  }
</style>
</head>
<body>

<header class="top">
  <div class="top-row">
    <button class="brand" id="brandBtn" aria-label="Bosh sahifa">
      <span id="logoSlot"><span class="logo-mark" id="logoMark">O</span></span>
      <span class="site-name" id="siteName">Oshxona</span>
    </button>
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Qidiruv..." aria-label="Menyudan qidirish">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
    </div>
    <select class="lang-select" id="langSelect" aria-label="Tilni tanlash">
      <option value="uz">UZ</option>
      <option value="ru">RU</option>
      <option value="en">EN</option>
    </select>
    <div style="position:relative;">
      <button class="menu-btn" id="menuToggle" aria-label="Menyu" aria-haspopup="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
      </button>
      <div class="dropdown" id="dropdownMenu">
        <button id="btnSettings"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06A1.65 1.65 0 004.6 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 4.6a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg><span data-i18n="settings">Sozlamalar</span></button>
        <button id="btnInfoReopen"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg><span data-i18n="infoMenu">Ma'lumot</span></button>
        <button id="btnChef"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V8a5 5 0 0110 0v3"/></svg><span data-i18n="chefPanel">Oshpaz paneli</span><span class="lock">🔒</span></button>
        <button id="btnAdmin"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V8a5 5 0 0110 0v3"/></svg><span data-i18n="adminPanel">Admin paneli</span><span class="lock">🔒</span></button>
      </div>
    </div>
  </div>
  <div class="cat-row" id="catRow"></div>
</header>

<main>
  <h2 class="section-title" id="gridTitle" data-i18n="allItems">Barcha taomlar</h2>
  <div class="grid" id="grid"></div>
  <div class="empty-state" id="emptyState" style="display:none;">
    <p data-i18n="noResults">Hech narsa topilmadi. Boshqa so'z bilan qidirib ko'ring.</p>
  </div>
</main>

<button class="info-fab" id="infoFab" aria-label="Ma'lumot" title="Ma'lumot">i</button>

<!-- DETAIL MODAL -->
<div class="overlay" id="detailOverlay">
  <div class="detail-sheet" role="dialog" aria-modal="true">
    <div class="dimg" id="detailImgWrap">
      <button class="detail-close" id="detailClose" aria-label="Yopish">✕</button>
    </div>
    <div class="detail-body">
      <span class="detail-price" id="detailPrice"></span>
      <h3 class="detail-name" id="detailName"></h3>
      <p class="detail-desc" id="detailDesc"></p>
      <button class="voice-btn" id="voiceBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/></svg>
        <span id="voiceBtnLabel" data-i18n="listen">Ovozli eshitish</span>
      </button>
    </div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="overlay" id="settingsOverlay">
  <div class="detail-sheet" role="dialog" aria-modal="true" style="max-height:70vh;">
    <div class="detail-body" style="padding-top:18px;">
      <button class="detail-close" id="settingsClose" style="position:static; float:right; background:var(--cream-dim); color:var(--text);">✕</button>
      <h3 class="detail-name" data-i18n="settings">Sozlamalar</h3>
      <div class="settings-body">
        <div class="set-row">
          <div>
            <div class="set-label" data-i18n="darkMode">Tungi rejim</div>
            <div class="set-sub" data-i18n="darkModeSub">Ko'zga yengil, kechqurun uchun qulay</div>
          </div>
          <button class="toggle" id="themeToggle" aria-label="Tungi rejim"></button>
        </div>
        <div class="set-row">
          <div>
            <div class="set-label" data-i18n="fontSize">Shrift o'lchami</div>
            <div class="set-sub" data-i18n="fontSizeSub">Katta yozuv — kattalar uchun qulay</div>
          </div>
          <div class="fs-btns">
            <button data-fs="0.9" id="fsSmall">A</button>
            <button data-fs="1" id="fsMed" style="font-size:1.1rem;">A</button>
            <button data-fs="1.18" id="fsLarge" style="font-size:1.3rem;">A</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- INFO NOTE -->
<div class="note-overlay" id="noteOverlay">
  <div class="note-card" role="dialog" aria-modal="true">
    <button class="note-close" id="noteClose" aria-label="Yopish">✕</button>
    <div class="note-eyebrow" id="noteEyebrow">Ma'lumot</div>
    <h3 class="note-title" id="noteTitle"></h3>
    <p class="note-text" id="noteText"></p>
    <div class="note-nav">
      <button class="note-nav-btn" id="notePrev" aria-label="Oldingi">‹</button>
      <div class="note-dots" id="noteDots"></div>
      <button class="note-nav-btn" id="noteNext" aria-label="Keyingi">›</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";

  /* ============ I18N ============ */
  const I18N = {
    uz:{ settings:"Sozlamalar", infoMenu:"Ma'lumot", chefPanel:"Oshpaz paneli", adminPanel:"Admin paneli",
      allItems:"Barcha taomlar", noResults:"Hech narsa topilmadi. Boshqa so'z bilan qidirib ko'ring.",
      listen:"Ovozli eshitish", stopListen:"To'xtatish", darkMode:"Tungi rejim", darkModeSub:"Ko'zga yengil, kechqurun uchun qulay",
      fontSize:"Shrift o'lchami", fontSizeSub:"Katta yozuv — kattalar uchun qulay",
      locked:"Bu panelga kirish uchun parol talab qilinadi. Tez orada ishga tushadi.",
      searchPh:"Qidiruv...", all:"Barchasi" },
    ru:{ settings:"Настройки", infoMenu:"Информация", chefPanel:"Панель повара", adminPanel:"Панель админа",
      allItems:"Все блюда", noResults:"Ничего не найдено. Попробуйте другой запрос.",
      listen:"Слушать", stopListen:"Остановить", darkMode:"Ночной режим", darkModeSub:"Комфортно для глаз вечером",
      fontSize:"Размер шрифта", fontSizeSub:"Крупный текст — удобно для старших",
      locked:"Для входа в эту панель нужен пароль. Скоро будет доступно.",
      searchPh:"Поиск...", all:"Все" },
    en:{ settings:"Settings", infoMenu:"Info", chefPanel:"Chef panel", adminPanel:"Admin panel",
      allItems:"All items", noResults:"Nothing found. Try a different search.",
      listen:"Listen", stopListen:"Stop", darkMode:"Dark mode", darkModeSub:"Easier on the eyes at night",
      fontSize:"Text size", fontSizeSub:"Larger text — easier for older guests",
      locked:"This panel needs a password. Coming soon.",
      searchPh:"Search...", all:"All" }
  };
  let lang = "uz";

  /* ============ SEED DATA (admin panel will later write to these same storage keys) ============ */
  const DEFAULT_CONFIG = { name:"Oshxona", logoUrl:"", logoSize:40 };

  const DEFAULT_INFO = [
    { title:{uz:"Xush kelibsiz!",ru:"Добро пожаловать!",en:"Welcome!"},
      body:{uz:"Bu — bizning raqamli menyumiz. Yuqoridagi qidiruv orqali taom yoki ichimlik toping, yoki pastdagi turkumlardan birini tanlang.",
            ru:"Это наше цифровое меню. Используйте поиск сверху, чтобы найти блюдо или напиток, либо выберите одну из категорий ниже.",
            en:"This is our digital menu. Use the search above to find a dish or drink, or pick a category below."} },
    { title:{uz:"Qanday foydalanish",ru:"Как пользоваться",en:"How to use it"},
      body:{uz:"Istalgan taomning rasmini bosing — narxi, tavsifi va ovozli tinglash tugmasi ochiladi. Katta yozuvni yoqish uchun yuqoridagi menyudan 'Sozlamalar'ga kiring.",
            ru:"Нажмите на карточку любого блюда — откроются цена, описание и кнопка озвучки. Крупный шрифт можно включить в разделе 'Настройки'.",
            en:"Tap any item's card to see its price, description, and a listen button. Turn on large text from the Settings menu above."} },
    { title:{uz:"Bog'lanish",ru:"Связаться с нами",en:"Get in touch"},
      body:{uz:"Savol yoki taklifingiz bo'lsa, ofitsiantimizga murojaat qiling. Buyurtma shu yerdan emas, ofitsiant orqali qabul qilinadi.",
            ru:"Если есть вопрос или пожелание — обратитесь к официанту. Заказ оформляется через официанта, а не отсюда.",
            en:"If you have a question, just ask your waiter. Orders are placed through the waiter, not from this screen."} }
  ];

  const DEFAULT_MENU = [
    { id:1, cat:"taomlar", name:{uz:"Osh",ru:"Плов",en:"Osh (Plov)"}, price:35000,
      desc:{uz:"An'anaviy o'zbek oshi — guruch, qora sabzi, mol go'shti va ziravorlar bilan pishirilgan.",
            ru:"Традиционный узбекский плов — рис, морковь, говядина и специи.",
            en:"Traditional Uzbek plov — rice, carrots, beef and spices, slow-cooked together."}, img:"" },
    { id:2, cat:"taomlar", name:{uz:"Manti",ru:"Манты",en:"Manti"}, price:28000,
      desc:{uz:"Bug'da pishirilgan xamir ichida go'sht va piyoz to'ldirilgan taom.",
            ru:"Тесто на пару с начинкой из мяса и лука.",
            en:"Steamed dumplings filled with minced meat and onion."}, img:"" },
    { id:3, cat:"taomlar", name:{uz:"Lag'mon",ru:"Лагман",en:"Lagman"}, price:30000,
      desc:{uz:"Qo'lda cho'zilgan uzun xamir, sabzavotlar va go'sht bilan sho'rva shaklida.",
            ru:"Домашняя тянутая лапша с овощами и мясом в бульоне.",
            en:"Hand-pulled noodles with vegetables and meat in a savory broth."}, img:"" },
    { id:4, cat:"taomlar", name:{uz:"Shashlik",ru:"Шашлык",en:"Shashlik"}, price:45000,
      desc:{uz:"Cho'g'da pishirilgan mol yoki qo'y go'shti shashligi.",
            ru:"Шашлык из говядины или баранины, приготовленный на углях.",
            en:"Skewered beef or lamb, grilled over charcoal."}, img:"" },
    { id:5, cat:"ichimliklar", name:{uz:"Ko'k choy",ru:"Зелёный чай",en:"Green tea"}, price:5000,
      desc:{uz:"Issiq holda xizmat ko'rsatiladigan an'anaviy ko'k choy.",ru:"Традиционный зелёный чай, подаётся горячим.",
            en:"Traditional green tea, served hot."}, img:"" },
    { id:6, cat:"ichimliklar", name:{uz:"Qora choy",ru:"Чёрный чай",en:"Black tea"}, price:5000,
      desc:{uz:"Kuchli damlangan qora choy.",ru:"Крепко заваренный чёрный чай.",en:"Strongly brewed black tea."}, img:"" },
    { id:7, cat:"ichimliklar", name:{uz:"Kompot",ru:"Компот",en:"Compote"}, price:8000,
      desc:{uz:"Mavsumiy mevalardan tayyorlangan uy sharbati.",ru:"Домашний напиток из сезонных фруктов.",
            en:"House-made drink from seasonal fruit."}, img:"" },
    { id:8, cat:"ichimliklar", name:{uz:"Limonad",ru:"Лимонад",en:"Lemonade"}, price:10000,
      desc:{uz:"Yangi limon va yalpizdan tayyorlangan sovutilgan ichimlik.",ru:"Освежающий напиток из свежего лимона и мяты.",
            en:"Refreshing drink made with fresh lemon and mint."}, img:"" },
    { id:9, cat:"shirinliklar", name:{uz:"Napoleon tort",ru:"Торт Наполеон",en:"Napoleon cake"}, price:15000,
      desc:{uz:"Qavat-qavat pishloqli krem bilan tayyorlangan shirinlik.",ru:"Слоёный торт с заварным кремом.",
            en:"Layered pastry with rich custard cream."}, img:"" },
    { id:10, cat:"shirinliklar", name:{uz:"Baklava",ru:"Пахлава",en:"Baklava"}, price:12000,
      desc:{uz:"Yong'oq va asal bilan tayyorlangan sharqona shirinlik.",ru:"Восточная сладость с орехами и мёдом.",
            en:"Sweet pastry layered with nuts and honey."}, img:"" }
  ];

  const CAT_LABELS = {
    taomlar:{uz:"Taomlar",ru:"Блюда",en:"Dishes"},
    ichimliklar:{uz:"Ichimliklar",ru:"Напитки",en:"Drinks"},
    shirinliklar:{uz:"Shirinliklar",ru:"Десерты",en:"Desserts"}
  };

  const CAT_ICONS = {
    taomlar:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="8.5"/><circle cx="12" cy="12" r="3.2"/></svg>',
    ichimliklar:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M6 3h12l-1.2 15.5A2 2 0 0114.8 20H9.2a2 2 0 01-2-1.5L6 3z"/><path d="M5 3h14"/><path d="M8.5 9.5h7"/></svg>',
    shirinliklar:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 11a8 8 0 0116 0"/><rect x="3" y="11" width="18" height="3" rx="1"/><path d="M5 14l1 6h12l1-6"/></svg>'
  };
  const DEFAULT_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="4" y="4" width="16" height="16" rx="3"/><path d="M8 12h8M12 8v8"/></svg>';

  let config = DEFAULT_CONFIG, infoPages = DEFAULT_INFO, menuItems = DEFAULT_MENU;
  let activeCat = "all";
  let searchTerm = "";
  let noteIndex = 0;

  /* ============ STORAGE HELPERS ============ */
  async function storeGet(key, shared){
    try{ const r = await window.storage.get(key, !!shared); return r ? JSON.parse(r.value) : null; }
    catch(e){ return null; }
  }
  async function storeSet(key, value, shared){
    try{ await window.storage.set(key, JSON.stringify(value), !!shared); }catch(e){}
  }

  async function loadAll(){
    const c = await storeGet('site-config', true);
    const i = await storeGet('info-pages', true);
    const m = await storeGet('menu-items', true);
    const savedLang = await storeGet('pref-language', false);
    const savedTheme = await storeGet('pref-theme', false);
    const savedFs = await storeGet('pref-fontsize', false);
    config = c || DEFAULT_CONFIG;
    infoPages = (i && i.length) ? i : DEFAULT_INFO;
    menuItems = (m && m.length) ? m : DEFAULT_MENU;
    if(!c) storeSet('site-config', DEFAULT_CONFIG, true);
    if(!i) storeSet('info-pages', DEFAULT_INFO, true);
    if(!m) storeSet('menu-items', DEFAULT_MENU, true);
    if(savedLang) lang = savedLang;
    document.documentElement.setAttribute('data-theme', savedTheme === 'dark' ? 'dark' : 'light');
    if(savedFs) document.documentElement.style.setProperty('--fs-scale', savedFs);
  }

  /* ============ RENDER ============ */
  function t(key){ return (I18N[lang] && I18N[lang][key]) || I18N.uz[key] || key; }

  function applyI18n(){
    document.querySelectorAll('[data-i18n]').forEach(el=>{
      const k = el.getAttribute('data-i18n');
      el.textContent = t(k);
    });
    document.getElementById('searchInput').placeholder = t('searchPh');
    document.getElementById('siteName').textContent = config.name || "Oshxona";
    document.getElementById('logoMark').textContent = (config.name||"O").trim().charAt(0).toUpperCase();
    document.documentElement.style.setProperty('--logo-size', (config.logoSize||40)+"px");
    const slot = document.getElementById('logoSlot');
    if(config.logoUrl){
      slot.innerHTML = '<img src="'+config.logoUrl+'" alt="'+(config.name||'Logo')+'">';
    } else {
      slot.innerHTML = '<span class="logo-mark" id="logoMark">'+((config.name||"O").trim().charAt(0).toUpperCase())+'</span>';
    }
  }

  function renderCategories(){
    const cats = ["all", ...Array.from(new Set(menuItems.map(m=>m.cat)))];
    const row = document.getElementById('catRow');
    row.innerHTML = "";
    cats.forEach(c=>{
      const btn = document.createElement('button');
      btn.className = 'cat-pill' + (activeCat===c ? ' active' : '');
      btn.textContent = c==="all" ? t('all') : ((CAT_LABELS[c] && CAT_LABELS[c][lang]) || c);
      btn.addEventListener('click', ()=>{ activeCat = c; searchTerm=""; document.getElementById('searchInput').value=""; renderCategories(); renderGrid(); });
      row.appendChild(btn);
    });
  }

  function fmtPrice(n){
    return n.toLocaleString('ru-RU') + " so'm";
  }

  function renderGrid(){
    const grid = document.getElementById('grid');
    const empty = document.getElementById('emptyState');
    const title = document.getElementById('gridTitle');
    let items = menuItems;
    if(activeCat !== "all") items = items.filter(m=>m.cat===activeCat);
    if(searchTerm.trim()){
      const s = searchTerm.trim().toLowerCase();
      items = menuItems.filter(m=>{
        const catLabel = ((CAT_LABELS[m.cat]&&CAT_LABELS[m.cat][lang])||m.cat).toLowerCase();
        const nm = (m.name[lang]||m.name.uz||"").toLowerCase();
        const ds = (m.desc[lang]||m.desc.uz||"").toLowerCase();
        return nm.includes(s) || ds.includes(s) || catLabel.includes(s) || m.cat.includes(s);
      });
      title.textContent = "\u201C"+searchTerm+"\u201D";
    } else {
      title.textContent = activeCat==="all" ? t('allItems') : ((CAT_LABELS[activeCat]&&CAT_LABELS[activeCat][lang])||activeCat);
    }

    grid.innerHTML = "";
    if(!items.length){ empty.style.display='block'; return; } else { empty.style.display='none'; }

    items.forEach((m,idx)=>{
      const card = document.createElement('button');
      card.className = 'card';
      card.style.animationDelay = (idx*0.045)+"s";
      const icon = CAT_ICONS[m.cat] || DEFAULT_ICON;
      const thumbInner = m.img ? '<img src="'+m.img+'" alt="">' : icon;
      card.innerHTML =
        '<div class="thumb">'+thumbInner+'<span class="price-badge">'+fmtPrice(m.price)+'</span></div>'+
        '<div class="info"><div class="cat-label">'+((CAT_LABELS[m.cat]&&CAT_LABELS[m.cat][lang])||m.cat)+'</div>'+
        '<div class="name">'+(m.name[lang]||m.name.uz)+'</div></div>';
      card.addEventListener('click', ()=> openDetail(m));
      grid.appendChild(card);
    });
  }

  /* ============ DETAIL MODAL ============ */
  let currentUtterance = null;
  function openDetail(m){
    document.getElementById('detailPrice').textContent = fmtPrice(m.price);
    document.getElementById('detailName').textContent = m.name[lang]||m.name.uz;
    document.getElementById('detailDesc').textContent = m.desc[lang]||m.desc.uz;
    const imgWrap = document.getElementById('detailImgWrap');
    const icon = CAT_ICONS[m.cat] || DEFAULT_ICON;
    imgWrap.innerHTML = (m.img ? '<img src="'+m.img+'" alt="">' : icon) +
      '<button class="detail-close" id="detailClose" aria-label="Yopish">\u2715</button>';
    document.getElementById('detailClose').addEventListener('click', closeDetail);
    document.getElementById('voiceBtn').dataset.text = m.desc[lang]||m.desc.uz;
    document.getElementById('voiceBtn').dataset.title = m.name[lang]||m.name.uz;
    resetVoiceBtn();
    document.getElementById('detailOverlay').classList.add('open');
  }
  function closeDetail(){
    document.getElementById('detailOverlay').classList.remove('open');
    stopVoice();
  }
  document.getElementById('detailOverlay').addEventListener('click', e=>{
    if(e.target.id === 'detailOverlay') closeDetail();
  });

  function resetVoiceBtn(){
    const btn = document.getElementById('voiceBtn');
    btn.classList.remove('speaking');
    document.getElementById('voiceBtnLabel').textContent = t('listen');
  }
  function stopVoice(){
    if('speechSynthesis' in window){ window.speechSynthesis.cancel(); }
    resetVoiceBtn();
  }
  document.getElementById('voiceBtn').addEventListener('click', function(){
    if(!('speechSynthesis' in window)){
      showToast(lang==='uz' ? "Bu qurilmada ovozli o'qish qo'llab-quvvatlanmaydi." : lang==='ru' ? "Устройство не поддерживает озвучку." : "Voice isn't supported on this device.");
      return;
    }
    if(this.classList.contains('speaking')){ stopVoice(); return; }
    window.speechSynthesis.cancel();
    const text = this.dataset.title + ". " + this.dataset.text;
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang==='uz' ? 'ru-RU' : (lang==='ru' ? 'ru-RU' : 'en-US'); // uz TTS voices are rare; ru is closest phonetically available
    u.rate = 0.95;
    const voices = window.speechSynthesis.getVoices();
    const match = voices.find(v=>v.lang && v.lang.toLowerCase().startsWith(u.lang.slice(0,2)));
    if(match) u.voice = match;
    u.onstart = ()=>{ this.classList.add('speaking'); document.getElementById('voiceBtnLabel').textContent = t('stopListen'); };
    u.onend = ()=> resetVoiceBtn();
    u.onerror = ()=> resetVoiceBtn();
    currentUtterance = u;
    window.speechSynthesis.speak(u);
  });

  /* ============ INFO NOTE ============ */
  function renderNoteDots(){
    const dots = document.getElementById('noteDots');
    dots.innerHTML = "";
    infoPages.forEach((_,i)=>{
      const d = document.createElement('span');
      d.className = 'note-dot' + (i===noteIndex ? ' active' : '');
      dots.appendChild(d);
    });
  }
  function renderNote(){
    const page = infoPages[noteIndex];
    document.getElementById('noteTitle').textContent = page.title[lang]||page.title.uz;
    document.getElementById('noteText').textContent = page.body[lang]||page.body.uz;
    document.getElementById('notePrev').disabled = noteIndex===0;
    document.getElementById('noteNext').disabled = noteIndex===infoPages.length-1;
    renderNoteDots();
  }
  function openNote(){ noteIndex=0; renderNote(); document.getElementById('noteOverlay').classList.add('open'); }
  function closeNote(){
    document.getElementById('noteOverlay').classList.remove('open');
    storeSet('seen-intro', true, false);
  }
  document.getElementById('noteClose').addEventListener('click', closeNote);
  document.getElementById('noteOverlay').addEventListener('click', e=>{ if(e.target.id==='noteOverlay') closeNote(); });
  document.getElementById('notePrev').addEventListener('click', ()=>{ if(noteIndex>0){ noteIndex--; renderNote(); } });
  document.getElementById('noteNext').addEventListener('click', ()=>{ if(noteIndex<infoPages.length-1){ noteIndex++; renderNote(); } });
  document.getElementById('infoFab').addEventListener('click', openNote);
  document.getElementById('btnInfoReopen').addEventListener('click', ()=>{ closeDropdown(); openNote(); });

  /* ============ DROPDOWN MENU ============ */
  const dropdown = document.getElementById('dropdownMenu');
  function closeDropdown(){ dropdown.classList.remove('open'); }
  document.getElementById('menuToggle').addEventListener('click', (e)=>{
    e.stopPropagation(); dropdown.classList.toggle('open');
  });
  document.addEventListener('click', (e)=>{ if(!dropdown.contains(e.target)) closeDropdown(); });

  document.getElementById('btnChef').addEventListener('click', ()=>{ closeDropdown(); showToast(t('locked')); });
  document.getElementById('btnAdmin').addEventListener('click', ()=>{ closeDropdown(); showToast(t('locked')); });

  /* ============ SETTINGS ============ */
  document.getElementById('btnSettings').addEventListener('click', ()=>{
    closeDropdown();
    document.getElementById('settingsOverlay').classList.add('open');
  });
  document.getElementById('settingsClose').addEventListener('click', ()=>{
    document.getElementById('settingsOverlay').classList.remove('open');
  });
  document.getElementById('settingsOverlay').addEventListener('click', e=>{
    if(e.target.id === 'settingsOverlay') document.getElementById('settingsOverlay').classList.remove('open');
  });

  const themeToggle = document.getElementById('themeToggle');
  themeToggle.addEventListener('click', ()=>{
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    const next = isDark ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    themeToggle.classList.toggle('on', next==='dark');
    storeSet('pref-theme', next, false);
  });

  document.querySelectorAll('.fs-btns button').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const val = btn.dataset.fs;
      document.documentElement.style.setProperty('--fs-scale', val);
      document.querySelectorAll('.fs-btns button').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      storeSet('pref-fontsize', val, false);
    });
  });

  /* ============ SEARCH & LANG ============ */
  let searchDebounce;
  document.getElementById('searchInput').addEventListener('input', (e)=>{
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(()=>{ searchTerm = e.target.value; renderGrid(); }, 120);
  });

  document.getElementById('langSelect').addEventListener('change', (e)=>{
    lang = e.target.value;
    storeSet('pref-language', lang, false);
    applyI18n(); renderCategories(); renderGrid();
  });

  /* ============ TOAST ============ */
  let toastTimer;
  function showToast(msg){
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(()=> el.classList.remove('show'), 2600);
  }

  /* ============ INIT ============ */
  async function init(){
    await loadAll();
    document.getElementById('langSelect').value = lang;
    themeToggle.classList.toggle('on', document.documentElement.getAttribute('data-theme')==='dark');
    const fsScale = getComputedStyle(document.documentElement).getPropertyValue('--fs-scale').trim();
    document.querySelectorAll('.fs-btns button').forEach(b=>{
      b.classList.toggle('active', b.dataset.fs === fsScale || (fsScale==='' && b.id==='fsMed'));
    });
    if(!fsScale) document.getElementById('fsMed').classList.add('active');

    applyI18n();
    renderCategories();
    renderGrid();

    const seen = await storeGet('seen-intro', false);
    if(!seen){ setTimeout(openNote, 450); }

    if('speechSynthesis' in window){ window.speechSynthesis.getVoices(); }
  }

  init();
})();
</script>
</body>
</html>
