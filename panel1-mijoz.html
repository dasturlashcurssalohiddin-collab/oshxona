<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0">
<title>Oshxona Menyu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
/* ==========================================================================
   ADMIN PANEL ORQALI O'ZGARTIRILADIGAN QIYMATLAR (hozircha qo'lda kiritilgan)
   Kelajakda admin panel shu CSS o'zgaruvchilarini (logo o'lchami va h.k.)
   dinamik ravishda yozib turadi.
   ========================================================================== */
:root{
  --logo-size: 46px;              /* Admin panelda logotip o'lchamini shu yerdan boshqarish mumkin */
  --radius-sm: 10px;
  --radius-md: 16px;
  --radius-lg: 22px;

  --font-display: 'Fraunces', serif;
  --font-body: 'Manrope', sans-serif;
  --font-mono: 'IBM Plex Mono', monospace;

  /* ---- LIGHT (kunduzgi) mavzu ---- */
  --bg: #FBF7EF;
  --surface: #FFFFFF;
  --surface-2: #F4EDDC;
  --text: #26231D;
  --muted: #6E6858;
  --border: #E8DEC8;
  --accent: #B5541B;      /* taomlar — mis/paprika */
  --accent-2: #1F6F5C;    /* ichimliklar — chuqur tiniq yashil */
  --gold: #C98A2C;
  --shadow: 0 10px 30px -12px rgba(38,35,29,0.18);
}

[data-theme="dark"]{
  --bg: #17140F;
  --surface: #221E17;
  --surface-2: #2B261D;
  --text: #F3ECDD;
  --muted: #B7AC93;
  --border: #3A3427;
  --accent: #E08A44;
  --accent-2: #45B097;
  --gold: #E8BE63;
  --shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
}

*{box-sizing:border-box; margin:0; padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  transition: background .35s ease, color .35s ease;
  min-height:100vh;
  padding-bottom: 60px;
}

/* -------------------- ikat naqsh — imzo detal -------------------- */
.ikat-divider{
  height: 14px;
  width:100%;
  background-image: repeating-linear-gradient(
    115deg,
    var(--gold) 0 10px,
    transparent 10px 22px
  );
  opacity:.55;
  mask-image: linear-gradient(180deg,#000 60%, transparent);
}

/* -------------------- HEADER -------------------- */
header.top{
  position:sticky; top:0; z-index:40;
  background: var(--surface);
  border-bottom:1px solid var(--border);
  padding: 14px clamp(14px, 4vw, 40px);
}
.top-row{
  display:flex; align-items:center; gap:16px; max-width:1180px; margin:0 auto;
}
.logo-wrap{
  width: var(--logo-size); height: var(--logo-size);
  flex:0 0 auto; border-radius: 50%;
  display:flex; align-items:center; justify-content:center;
  background: linear-gradient(145deg, var(--accent), var(--gold));
  color:#fff; font-family:var(--font-display); font-weight:700;
  box-shadow: var(--shadow);
}
.logo-wrap svg{width:62%; height:62%;}

.search-wrap{
  flex:1 1 auto; position:relative; height: var(--logo-size);
}
.search-wrap input{
  width:100%; height:100%;
  border-radius: 999px;
  border:1.5px solid var(--border);
  background: var(--surface-2);
  color: var(--text);
  padding: 0 20px 0 46px;
  font-family: var(--font-body);
  font-size: 16px;
  outline:none;
  transition: border-color .2s ease, box-shadow .2s ease;
}
.search-wrap input:focus{border-color: var(--accent); box-shadow:0 0 0 4px color-mix(in srgb, var(--accent) 18%, transparent);}
.search-wrap svg{
  position:absolute; left:16px; top:50%; transform:translateY(-50%);
  width:20px; height:20px; color:var(--muted); pointer-events:none;
}

.icon-btn{
  width:44px; height:44px; border-radius:50%;
  border:1.5px solid var(--border); background:var(--surface-2);
  display:flex; align-items:center; justify-content:center;
  color:var(--text); cursor:pointer; flex:0 0 auto;
  transition: transform .15s ease, background .2s ease;
}
.icon-btn:hover{ transform:translateY(-2px); background:var(--border); }
.icon-btn svg{width:20px;height:20px;}

.menu-pop{ position:relative; }
.menu-panel{
  position:absolute; right:0; top:calc(100% + 10px);
  background:var(--surface); border:1px solid var(--border);
  border-radius: var(--radius-md); box-shadow: var(--shadow);
  min-width: 240px; padding:10px; display:none; z-index:50;
}
.menu-panel.open{display:block;}
.menu-panel .grp-label{
  font-size:11px; letter-spacing:.08em; text-transform:uppercase;
  color:var(--muted); padding:8px 10px 4px;
}
.menu-item-row{
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  padding:10px 10px; border-radius:10px; cursor:pointer; font-size:15px;
}
.menu-item-row:hover{ background:var(--surface-2); }
.menu-item-row .lock{width:16px;height:16px;color:var(--muted);}
.lang-select{
  border:none; background:transparent; color:var(--text);
  font-family:var(--font-body); font-size:14px; padding:8px 10px;
  border-radius:10px; cursor:pointer;
}
.lang-select:hover{background:var(--surface-2);}
.theme-toggle-row{
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 10px; font-size:15px;
}
.switch{
  width:42px; height:24px; border-radius:999px; background:var(--border);
  position:relative; cursor:pointer; flex:0 0 auto;
}
.switch::after{
  content:''; position:absolute; width:18px; height:18px; border-radius:50%;
  background:#fff; top:3px; left:3px; transition:left .2s ease;
  box-shadow:0 1px 3px rgba(0,0,0,.3);
}
[data-theme="dark"] .switch::after{ left:21px; }
[data-theme="dark"] .switch{ background: var(--accent); }

/* -------------------- CATEGORY CHIPS -------------------- */
.cats{
  max-width:1180px; margin: 18px auto 0; padding: 0 clamp(14px,4vw,40px);
  display:flex; gap:10px; overflow-x:auto; scrollbar-width:none;
}
.cats::-webkit-scrollbar{display:none;}
.chip{
  flex:0 0 auto; padding:10px 18px; border-radius:999px;
  border:1.5px solid var(--border); background:var(--surface);
  font-size:14.5px; font-weight:600; color:var(--muted); cursor:pointer;
  transition: all .2s ease; white-space:nowrap;
}
.chip.active{
  background: var(--accent); border-color:var(--accent); color:#fff;
}
.chip[data-cat="ichimliklar"].active{ background:var(--accent-2); border-color:var(--accent-2); }

/* -------------------- MENU GRID -------------------- */
main{ max-width:1180px; margin: 22px auto 0; padding: 0 clamp(14px,4vw,40px); }
.section-title{
  font-family:var(--font-display); font-size: clamp(24px,3vw,32px);
  font-weight:600; margin: 26px 0 14px;
}
.grid{
  display:grid; gap:18px;
  grid-template-columns: repeat(auto-fill, minmax(230px,1fr));
}
.card{
  background:var(--surface); border:1px solid var(--border);
  border-radius: var(--radius-lg); overflow:hidden; cursor:pointer;
  box-shadow: var(--shadow);
  opacity:0; transform: translateY(18px);
  transition: transform .25s ease, box-shadow .25s ease;
}
.card.in{ animation: riseIn .55s cubic-bezier(.2,.8,.2,1) forwards; }
@keyframes riseIn{ to{ opacity:1; transform:translateY(0);} }
.card:hover{ transform: translateY(-4px); box-shadow: 0 16px 34px -14px rgba(0,0,0,.28); }

.card .photo{
  height:150px; position:relative; overflow:hidden;
  background: linear-gradient(135deg, var(--surface-2), var(--border));
  display:flex; align-items:center; justify-content:center;
}
.card .photo img{width:100%; height:100%; object-fit:cover; display:block;}
.card .photo .ph-icon{ width:38px; height:38px; color:var(--muted); opacity:.6; }
.steam{position:absolute; bottom:8px; left:50%; width:3px; height:22px;
  background:linear-gradient(180deg, transparent, rgba(255,255,255,.55));
  border-radius:3px; opacity:0; filter:blur(1px);}
.card:hover .steam{ animation: steamRise 1.4s ease-in-out infinite; }
.steam.s2{ left:calc(50% + 10px); animation-delay:.2s;}
.steam.s3{ left:calc(50% - 10px); animation-delay:.4s;}
@keyframes steamRise{
  0%{ opacity:0; transform: translateY(0) scaleY(.6);}
  30%{ opacity:.7;}
  100%{ opacity:0; transform: translateY(-26px) scaleY(1.2);}
}
.card .info{ padding:14px 16px 16px; }
.card .name{ font-family:var(--font-display); font-size:18px; font-weight:600; margin-bottom:4px;}
.card .desc{ font-size:13.5px; color:var(--muted); line-height:1.4;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; min-height:36px;}
.card .price{
  margin-top:10px; font-family:var(--font-mono); font-weight:600; font-size:15px; color:var(--accent);
}
.card[data-cat="ichimliklar"] .price{ color:var(--accent-2); }

.empty-state{
  text-align:center; padding: 60px 20px; color:var(--muted);
}
.empty-state svg{width:46px;height:46px; margin-bottom:12px; opacity:.5;}

/* -------------------- MODAL: birinchi kirishdagi ma'lumot (taxtacha) -------------------- */
.overlay{
  position:fixed; inset:0; background:rgba(20,17,12,.5);
  display:none; align-items:center; justify-content:center; z-index:100; padding:20px;
  backdrop-filter: blur(2px);
}
.overlay.open{ display:flex; }

.info-board{
  width:min(420px, 100%); background: var(--surface);
  border-radius: var(--radius-lg); box-shadow: var(--shadow);
  position:relative; padding: 30px 26px 26px;
  border: 1px solid var(--border);
  animation: boardIn .35s cubic-bezier(.2,.8,.2,1);
}
@keyframes boardIn{ from{opacity:0; transform:scale(.92) translateY(10px);} to{opacity:1; transform:scale(1) translateY(0);} }
.info-board::before{
  content:''; position:absolute; top:-10px; left:50%; transform:translateX(-50%);
  width:54px; height:8px; border-radius:6px; background: var(--gold); opacity:.7;
}
.close-x{
  position:absolute; top:14px; right:14px; width:34px; height:34px; border-radius:50%;
  border:none; background:var(--surface-2); cursor:pointer;
  display:flex; align-items:center; justify-content:center; color:var(--text);
}
.info-board .eyebrow{
  font-family:var(--font-mono); font-size:11.5px; letter-spacing:.1em; text-transform:uppercase;
  color:var(--gold); margin-bottom:8px;
}
.info-board h3{ font-family:var(--font-display); font-size:22px; margin-bottom:10px; padding-right:20px;}
.info-board p{ color:var(--muted); font-size:15px; line-height:1.6; min-height:80px;}
.board-nav{
  display:flex; align-items:center; justify-content:space-between; margin-top:22px;
}
.nav-btn{
  width:38px; height:38px; border-radius:50%; border:1.5px solid var(--border);
  background:var(--surface-2); cursor:pointer; display:flex; align-items:center; justify-content:center;
}
.nav-btn:disabled{ opacity:.35; cursor:default; }
.dots{ display:flex; gap:6px; }
.dot{ width:7px; height:7px; border-radius:50%; background:var(--border); }
.dot.active{ background:var(--accent); width:18px; border-radius:4px; transition:all .2s ease;}

/* -------------------- MODAL: taom haqida -------------------- */
.detail-sheet{
  width:min(480px, 100%); max-height:88vh; overflow:auto;
  background: var(--surface); border-radius: var(--radius-lg);
  box-shadow: var(--shadow); position:relative; border:1px solid var(--border);
  animation: boardIn .3s ease;
}
.detail-sheet .photo{
  height:220px; background:linear-gradient(135deg, var(--surface-2), var(--border));
  display:flex; align-items:center; justify-content:center; position:relative;
}
.detail-sheet .photo img{width:100%;height:100%;object-fit:cover;}
.detail-sheet .photo .ph-icon{ width:54px; height:54px; color:var(--muted); opacity:.6;}
.detail-body{ padding:22px 24px 26px; }
.detail-top{ display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
.detail-body h2{ font-family:var(--font-display); font-size:26px; font-weight:600; }
.detail-price{ font-family:var(--font-mono); font-weight:700; font-size:19px; color:var(--accent); white-space:nowrap;}
.detail-sheet[data-cat="ichimliklar"] .detail-price{ color:var(--accent-2); }
.detail-desc{ color:var(--muted); line-height:1.65; margin-top:12px; font-size:15.5px;}
.voice-row{
  margin-top:18px; display:flex; align-items:center; gap:10px;
}
.voice-btn{
  display:flex; align-items:center; gap:8px; padding:10px 18px; border-radius:999px;
  border:1.5px solid var(--accent); background:transparent; color:var(--accent);
  font-family:var(--font-body); font-weight:600; font-size:14px; cursor:pointer;
  transition: background .2s ease, color .2s ease;
}
.voice-btn:hover{ background:var(--accent); color:#fff; }
.voice-btn svg{width:18px;height:18px;}
.voice-btn.speaking{ background:var(--accent); color:#fff; }

/* -------------------- Parol darvozasi (2/3-panel) -------------------- */
.gate-box{
  width:min(340px,100%); background:var(--surface); border-radius:var(--radius-lg);
  border:1px solid var(--border); box-shadow:var(--shadow); padding:26px; text-align:center;
}
.gate-box .g-icon{ width:40px; height:40px; margin:0 auto 12px; color:var(--gold);}
.gate-box h3{ font-family:var(--font-display); font-size:20px; margin-bottom:6px;}
.gate-box p{ color:var(--muted); font-size:14px; margin-bottom:16px; line-height:1.5;}
.gate-box input{
  width:100%; padding:12px 14px; border-radius:10px; border:1.5px solid var(--border);
  background:var(--surface-2); color:var(--text); font-size:15px; margin-bottom:12px; outline:none;
}
.gate-box input:focus{border-color:var(--accent);}
.gate-btn{
  width:100%; padding:12px; border-radius:10px; border:none; background:var(--accent);
  color:#fff; font-weight:700; font-size:15px; cursor:pointer;
}
.gate-msg{ font-size:13px; color:var(--muted); margin-top:10px; }

@media (prefers-reduced-motion: reduce){
  *{animation-duration:.01ms !important; transition-duration:.01ms !important;}
}
</style>
</head>
<body>

<!-- =========================================================
     1-PANEL — MIJOZ UCHUN SAHIFA
     ========================================================= -->
<header class="top">
  <div class="top-row">
    <!-- Admin panel orqali shu joyga haqiqiy logotip rasmi qo'yiladi -->
    <div class="logo-wrap" id="logoWrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 3v18M4 3c4 0 4 3 8 3s4-3 8-3M4 10c4 0 4 3 8 3s4-3 8-3" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>

    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3" stroke-linecap="round"/></svg>
      <input id="searchInput" type="text" data-i18n-ph="search_ph" placeholder="Qidirish… masalan: ichimliklar">
    </div>

    <div class="menu-pop">
      <button class="icon-btn" id="infoReopenBtn" title="Ma'lumot" aria-label="Ma'lumot">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 11v6M12 7.5v.01" stroke-linecap="round"/></svg>
      </button>
    </div>

    <div class="menu-pop">
      <button class="icon-btn" id="menuBtn" aria-label="Menyu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h16M4 12h16M4 17h16" stroke-linecap="round"/></svg>
      </button>
      <div class="menu-panel" id="menuPanel">
        <div class="grp-label" data-i18n="grp_lang">Til</div>
        <select class="lang-select" id="langSelect">
          <option value="uz">O'zbekcha</option>
          <option value="ru">Русский</option>
          <option value="en">English</option>
        </select>

        <div class="grp-label" data-i18n="grp_settings">Sozlamalar</div>
        <div class="theme-toggle-row">
          <span data-i18n="dark_mode">Tungi rejim</span>
          <div class="switch" id="themeSwitch"></div>
        </div>

        <div class="grp-label" data-i18n="grp_panels">Boshqa panellar</div>
        <div class="menu-item-row" data-gate="chef">
          <span data-i18n="panel_chef">Oshpaz paneli</span>
          <svg class="lock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>
        </div>
        <div class="menu-item-row" data-gate="admin">
          <span data-i18n="panel_admin">Admin paneli</span>
          <svg class="lock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>
        </div>
      </div>
    </div>
  </div>
</header>
<div class="ikat-divider"></div>

<div class="cats" id="catsRow"></div>

<main>
  <div id="sectionsWrap"></div>
</main>

<!-- Birinchi marta kirganda chiqadigan ma'lumot taxtachasi -->
<div class="overlay" id="infoOverlay">
  <div class="info-board">
    <button class="close-x" id="infoClose" aria-label="Yopish">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18" stroke-linecap="round"/></svg>
    </button>
    <div class="eyebrow" data-i18n="board_eyebrow">Ma'lumot</div>
    <h3 id="boardTitle">—</h3>
    <p id="boardText">—</p>
    <div class="board-nav">
      <button class="nav-btn" id="boardPrev" aria-label="Oldingi">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 6l-6 6 6 6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="dots" id="boardDots"></div>
      <button class="nav-btn" id="boardNext" aria-label="Keyingi">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- Taom / ichimlik haqida batafsil -->
<div class="overlay" id="detailOverlay">
  <div class="detail-sheet" id="detailSheet">
    <button class="close-x" id="detailClose" aria-label="Yopish">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18" stroke-linecap="round"/></svg>
    </button>
    <div class="photo" id="detailPhoto">
      <svg class="ph-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="9" cy="11" r="2"/><path d="M21 16l-5-5-4 4-3-3-4 4"/></svg>
    </div>
    <div class="detail-body">
      <div class="detail-top">
        <h2 id="detailName">—</h2>
        <div class="detail-price" id="detailPrice">—</div>
      </div>
      <p class="detail-desc" id="detailDesc">—</p>
      <div class="voice-row">
        <button class="voice-btn" id="voiceBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H3v6h3l5 4V5z"/><path d="M15.5 8.5a5 5 0 0 1 0 7M18.5 6a9 9 0 0 1 0 12" stroke-linecap="round"/></svg>
          <span data-i18n="listen">Tinglash</span>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Oshpaz / Admin panelga parol darvozasi -->
<div class="overlay" id="gateOverlay">
  <div class="gate-box">
    <svg class="g-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>
    <h3 id="gateTitle">Oshpaz paneli</h3>
    <p data-i18n="gate_desc">Bu bo'lim parol bilan himoyalangan.</p>
    <input type="password" id="gatePass" placeholder="Parol">
    <button class="gate-btn" id="gateSubmit" data-i18n="gate_enter">Kirish</button>
    <div class="gate-msg" id="gateMsg"></div>
    <button class="icon-btn" id="gateClose" style="margin-top:14px;" aria-label="Yopish">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18" stroke-linecap="round"/></svg>
    </button>
  </div>
</div>

<script>
/* ============================================================
   ADMIN PANELDAN KELISHI KERAK BO'LGAN MA'LUMOTLAR
   Hozircha demo sifatida shu yerda qo'lda kiritilgan. Kelajakda
   admin paneli shu MENU_DATA, INFO_SLIDES va CATEGORIES massivlarini
   backend orqali (masalan JSON fayl yoki API) to'ldirib turadi.
   ============================================================ */
const CATEGORIES = [
  { id: 'all',         uz:'Barchasi',     ru:'Все',        en:'All' },
  { id: 'ovqatlar',    uz:'Taomlar',      ru:'Блюда',      en:'Food' },
  { id: 'ichimliklar', uz:'Ichimliklar',  ru:'Напитки',    en:'Drinks' },
  { id: 'shirinlik',   uz:'Shirinliklar', ru:'Десерты',    en:'Desserts' },
];

const MENU_DATA = [
  { id:1, cat:'ovqatlar', name:'Osh (Palov)', price:35000, img:'',
    desc:"Guruch, go'sht, sabzi va piyozdan tayyorlangan an'anaviy o'zbek taomi. Qozonda sekin pishiriladi." },
  { id:2, cat:'ovqatlar', name:"Lag'mon", price:28000, img:'',

const INFO_SLIDES = [
  { title:"Xush kelibsiz!", text:"Bu yerda menyudagi taom va ichimliklarni ko'rishingiz, tepadagi qidiruv orqali izlashingiz mumkin." },
  { title:"Qidiruv", text:"Masalan qidiruvga \"ichimliklar\" deb yozsangiz, faqat shu toifa chiqadi. Taom nomini yozib ham qidirishingiz mumkin." },
  { title:"Taom haqida", text:"Har qanday kartochkani bosing — rasmi, narxi va tavsifi ochiladi. \"Tinglash\" tugmasi orqali ma'lumot ovozli o'qib beriladi." },
];

/* ============================================================
   I18N — interfeys matnlari (menyu mahsulotlari emas)
   ============================================================ */
const I18N = {
  uz: { search_ph:"Qidirish… masalan: ichimliklar", grp_lang:"Til", grp_settings:"Sozlamalar",
        dark_mode:"Tungi rejim", grp_panels:"Boshqa panellar", panel_chef:"Oshpaz paneli",
        panel_admin:"Admin paneli", board_eyebrow:"Ma'lumot", listen:"Tinglash",
        gate_desc:"Bu bo'lim parol bilan himoyalangan.", gate_enter:"Kirish",
        empty:"Hech narsa topilmadi", gate_wip:"Bu panel hozircha tayyorlanmoqda." },
  ru: { search_ph:"Поиск… например: напитки", grp_lang:"Язык", grp_settings:"Настройки",
        dark_mode:"Тёмный режим", grp_panels:"Другие панели", panel_chef:"Панель повара",
        panel_admin:"Панель администратора", board_eyebrow:"Информация", listen:"Слушать",
        gate_desc:"Этот раздел защищён паролем.", gate_enter:"Войти",
        empty:"Ничего не найдено", gate_wip:"Эта панель пока в разработке." },
  en: { search_ph:"Search… e.g. drinks", grp_lang:"Language", grp_settings:"Settings",
        dark_mode:"Dark mode", grp_panels:"Other panels", panel_chef:"Chef panel",
        panel_admin:"Admin panel", board_eyebrow:"Info", listen:"Listen",
        gate_desc:"This section is password protected.", gate_enter:"Enter",
        empty:"Nothing found", gate_wip:"This panel is still under construction." },
};

let state = {
  lang: localStorage.getItem('oshxona_lang') || 'uz',
  theme: localStorage.getItem('oshxona_theme') || 'light',
  activeCat: 'all',
  query: '',
};

/* ---------------- Theme & language ---------------- */
function applyTheme(){
  document.documentElement.setAttribute('data-theme', state.theme === 'dark' ? 'dark' : 'light');
  localStorage.setItem('oshxona_theme', state.theme);
}
function applyLang(){
  const dict = I18N[state.lang];
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const k = el.getAttribute('data-i18n');
    if(dict[k]) el.textContent = dict[k];
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(el=>{
    const k = el.getAttribute('data-i18n-ph');
    if(dict[k]) el.setAttribute('placeholder', dict[k]);
  });
  document.getElementById('langSelect').value = state.lang;
  localStorage.setItem('oshxona_lang', state.lang);
  renderCats();
  renderSections();
}
document.getElementById('themeSwitch').addEventListener('click', ()=>{
  state.theme = state.theme === 'dark' ? 'light' : 'dark';
  applyTheme();
});
document.getElementById('langSelect').addEventListener('change', (e)=>{
  state.lang = e.target.value;
  applyLang();
});

/* ---------------- Menu button dropdown ---------------- */
const menuBtn = document.getElementById('menuBtn');
const menuPanel = document.getElementById('menuPanel');
menuBtn.addEventListener('click', (e)=>{ e.stopPropagation(); menuPanel.classList.toggle('open'); });
document.addEventListener('click', ()=> menuPanel.classList.remove('open'));
menuPanel.addEventListener('click', e=> e.stopPropagation());

/* ---------------- Categories ---------------- */
function renderCats(){
  const row = document.getElementById('catsRow');
  row.innerHTML = '';
  CATEGORIES.forEach(c=>{
    const btn = document.createElement('button');
    btn.className = 'chip' + (state.activeCat === c.id ? ' active' : '');
    btn.dataset.cat = c.id;
    btn.textContent = c[state.lang] || c.uz;
    btn.addEventListener('click', ()=>{
      state.activeCat = c.id;
      state.query = '';
      document.getElementById('searchInput').value = '';
      renderCats();
      renderSections();
    });
    row.appendChild(btn);
  });
}

/* ---------------- Menu grid render ---------------- */
function matchesQuery(item, q){
  if(!q) return true;
  q = q.toLowerCase();
  const cat = CATEGORIES.find(c=>c.id===item.cat);
  const catNames = cat ? [cat.uz, cat.ru, cat.en].join(' ').toLowerCase() : '';
  return item.name.toLowerCase().includes(q) || item.desc.toLowerCase().includes(q) || catNames.includes(q);
}

function photoBlock(item){
  if(item.img){
    return `<img src="${item.img}" alt="${item.name}">`;
  }
  return `<svg class="ph-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="9" cy="11" r="2"/><path d="M21 16l-5-5-4 4-3-3-4 4"/></svg>
  <div class="steam"></div><div class="steam s2"></div><div class="steam s3"></div>`;
}

function renderSections(){
  const wrap = document.getElementById('sectionsWrap');
  wrap.innerHTML = '';
  const q = state.query;

  let cats = state.activeCat === 'all' ? CATEGORIES.filter(c=>c.id!=='all') : CATEGORIES.filter(c=>c.id===state.activeCat);

  let anyResult = false;

  cats.forEach(cat=>{
    const items = MENU_DATA.filter(it=> it.cat===cat.id && matchesQuery(it, q));
    if(items.length===0) return;
    anyResult = true;

    const section = document.createElement('section');
    const title = document.createElement('div');
    title.className = 'section-title';
    title.textContent = cat[state.lang] || cat.uz;
    section.appendChild(title);

    const grid = document.createElement('div');
    grid.className = 'grid';

    items.forEach((item, idx)=>{
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.cat = item.cat;
      card.innerHTML = `
        <div class="photo">${photoBlock(item)}</div>
        <div class="info">
          <div class="name">${item.name}</div>
          <div class="desc">${item.desc}</div>
          <div class="price">${item.price.toLocaleString('fr-FR')} so'm</div>
        </div>`;
      card.addEventListener('click', ()=> openDetail(item));
      grid.appendChild(card);

      requestAnimationFrame(()=>{
        setTimeout(()=> card.classList.add('in'), idx*60);
      });
    });

    section.appendChild(grid);
    wrap.appendChild(section);
  });

  if(!anyResult){
    wrap.innerHTML = `<div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <div>${I18N[state.lang].empty}</div>
    </div>`;
  }
}

document.getElementById('searchInput').addEventListener('input', (e)=>{
  state.query = e.target.value.trim();
  renderSections();
});

/* ---------------- Detail modal + voice ---------------- */
const detailOverlay = document.getElementById('detailOverlay');
const detailSheet = document.getElementById('detailSheet');
let currentUtterance = null;

function openDetail(item){
  document.getElementById('detailPhoto').innerHTML = photoBlock(item);
  document.getElementById('detailName').textContent = item.name;
  document.getElementById('detailPrice').textContent = item.price.toLocaleString('fr-FR') + " so'm";
  document.getElementById('detailDesc').textContent = item.desc;
  detailSheet.dataset.cat = item.cat;
  detailOverlay.classList.add('open');
  stopVoice();
}
document.getElementById('detailClose').addEventListener('click', ()=>{
  detailOverlay.classList.remove('open');
  stopVoice();
});
detailOverlay.addEventListener('click', (e)=>{ if(e.target===detailOverlay){ detailOverlay.classList.remove('open'); stopVoice(); }});

function stopVoice(){
  if('speechSynthesis' in window) window.speechSynthesis.cancel();
  document.getElementById('voiceBtn').classList.remove('speaking');
}
document.getElementById('voiceBtn').addEventListener('click', ()=>{
  const btn = document.getElementById('voiceBtn');
  if(!('speechSynthesis' in window)){
    alert("Bu brauzer ovozli o'qishni qo'llab-quvvatlamaydi.");
    return;
  }
  if(btn.classList.contains('speaking')){
    stopVoice();
    return;
  }
  const name = document.getElementById('detailName').textContent;
  const desc = document.getElementById('detailDesc').textContent;
  const utter = new SpeechSynthesisUtterance(name + '. ' + desc);
  utter.lang = state.lang === 'ru' ? 'ru-RU' : (state.lang === 'en' ? 'en-US' : 'uz-UZ');
  utter.rate = 0.95;
  utter.onend = ()=> btn.classList.remove('speaking');
  utter.onerror = ()=> btn.classList.remove('speaking');
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(utter);
  btn.classList.add('speaking');
});

/* ---------------- Birinchi kirish ma'lumot taxtachasi ---------------- */
const infoOverlay = document.getElementById('infoOverlay');
let slideIdx = 0;
function renderBoard(){
  const s = INFO_SLIDES[slideIdx];
  document.getElementById('boardTitle').textContent = s.title;
  document.getElementById('boardText').textContent = s.text;
  document.getElementById('boardPrev').disabled = slideIdx===0;
  document.getElementById('boardNext').disabled = slideIdx===INFO_SLIDES.length-1;
  const dots = document.getElementById('boardDots');
  dots.innerHTML='';
  INFO_SLIDES.forEach((_,i)=>{
    const d = document.createElement('div');
    d.className = 'dot' + (i===slideIdx ? ' active':'');
    dots.appendChild(d);
  });
}
document.getElementById('boardPrev').addEventListener('click', ()=>{ if(slideIdx>0){slideIdx--; renderBoard();}});
document.getElementById('boardNext').addEventListener('click', ()=>{ if(slideIdx<INFO_SLIDES.length-1){slideIdx++; renderBoard();}});
document.getElementById('infoClose').addEventListener('click', ()=>{
  infoOverlay.classList.remove('open');
  localStorage.setItem('oshxona_info_seen', '1');
});
document.getElementById('infoReopenBtn').addEventListener('click', ()=>{
  slideIdx = 0; renderBoard(); infoOverlay.classList.add('open');
});
infoOverlay.addEventListener('click', (e)=>{
  if(e.target===infoOverlay){ infoOverlay.classList.remove('open'); localStorage.setItem('oshxona_info_seen','1'); }
});

/* ---------------- 2/3-panel parol darvozasi ---------------- */
const gateOverlay = document.getElementById('gateOverlay');
let gateTarget = null;
document.querySelectorAll('[data-gate]').forEach(row=>{
  row.addEventListener('click', ()=>{
    gateTarget = row.dataset.gate;
    document.getElementById('gateTitle').textContent =
      gateTarget === 'chef' ? I18N[state.lang].panel_chef : I18N[state.lang].panel_admin;
    document.getElementById('gatePass').value = '';
    document.getElementById('gateMsg').textContent = '';
    menuPanel.classList.remove('open');
    gateOverlay.classList.add('open');
  });
});
document.getElementById('gateClose').addEventListener('click', ()=> gateOverlay.classList.remove('open'));
gateOverlay.addEventListener('click', (e)=>{ if(e.target===gateOverlay) gateOverlay.classList.remove('open'); });
document.getElementById('gateSubmit').addEventListener('click', ()=>{
  // Eslatma: 2-panel (oshpaz) va 3-panel (admin) hali qurilmagan.
  // Bu yerda faqat darvoza (gate) interfeysi tayyor — parolni
  // tekshiruvchi backend ulanganda shu joyga yoziladi.
  document.getElementById('gateMsg').textContent = I18N[state.lang].gate_wip;
});

/* ---------------- Init ---------------- */
applyTheme();
applyLang();
if(!localStorage.getItem('oshxona_info_seen')){
  slideIdx = 0; renderBoard();
  setTimeout(()=> infoOverlay.classList.add('open'), 400);
} else {
  renderBoard();
}
</script>
</body>
