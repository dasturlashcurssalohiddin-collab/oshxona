      // Google Translate free service (API key NOT required)
      async function translateWithGoogle(text, targetLang, sourceLang = "uz") {
        if (!text || !text.trim()) return text;
        try {
          const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sourceLang}&tl=${targetLang}&dt=t&q=${encodeURIComponent(text)}`;
          const res = await fetch(url);
          if (!res.ok) throw new Error("Tarjima xizmati javob bermadi");
          const data = await res.json();
          return data?.[0]?.map(chunk => chunk[0]).join("") || text;
        } catch (err) {
          console.warn("Google Translate error:", err);
          return text;
        }
      }
      // Universal media input component (Drag&Drop, paste Ctrl+V, file upload, or URL input)
      function ImageInput({ label, value, onChange, placeholder, accept = "image/*", className = "" }) {
        const fileInputRef = useRef(null);
        const [isDragging, setIsDragging] = useState(false);
        const [isLoading, setIsLoading] = useState(false);
        const readFileAsDataUrl = (file) => {
          setIsLoading(true);
          const reader = new FileReader();
          reader.onload = () => {
            if (typeof reader.result === "string") {
              onChange(reader.result);
            }
            setIsLoading(false);
          };
          reader.onerror = () => setIsLoading(false);
          reader.readAsDataURL(file);
        };
        const handleFileSelect = (e) => {
          const file = e.target.files?.[0];
          if (file) readFileAsDataUrl(file);
          e.target.value = "";
        };
        const handlePaste = (e) => {
          const items = e.clipboardData?.items;
          if (!items) return;
          for (let i = 0; i < items.length; i++) {
            const item = items[i];
            if (item.type.startsWith("image/")) {
              const file = item.getAsFile();
              if (file) {
                e.preventDefault();
                readFileAsDataUrl(file);
              }
              return;
            }
          }
        };
        const handleDrop = (e) => {
          e.preventDefault();
          setIsDragging(false);
          const file = e.dataTransfer.files?.[0];
          if (file) readFileAsDataUrl(file);
        };
        const isPreviewableImage =
          !!value &&
          (value.startsWith("data:image") ||
            /\.(jpe?g|png|gif|webp|svg|avif)(\?|$)/i.test(value) ||
            value.startsWith("http"));
        return (
          <div className={className}>
            <label className="text-[10px] font-bold text-zinc-400 block mb-1">{label}</label>
            <div
              onPaste={handlePaste}
              onDragOver={(e) => {
                e.preventDefault();
                setIsDragging(true);
              }}
              onDragLeave={() => setIsDragging(false)}
              onDrop={handleDrop}
              tabIndex={0}
              className={`flex items-center gap-2 px-2 py-1.5 bg-zinc-900 border rounded-xl transition-colors outline-none ${
                isDragging ? "border-amber-500 ring-2 ring-amber-500" : "border-zinc-800 focus-within:ring-2 focus-within:ring-amber-500"
              }`}
            >
              <input
                type="text"
                value={value}
                onChange={(e) => onChange(e.target.value)}
                placeholder={placeholder || "Rasm linki, Ctrl+V, yoki tortib tashlang"}
                className="flex-1 bg-transparent px-1 py-1 text-xs text-white outline-none min-w-0"
              />
              <button
                type="button"
                onClick={() => fileInputRef.current?.click()}
                title="Kompyuterdan / telefondan fayl tanlash"
                className="shrink-0 p-1.5 rounded-lg bg-zinc-800 hover:bg-amber-500 hover:text-black text-zinc-300 transition-colors"
              >
                <Upload size={14} />
              </button>
              {!!value && (
                <button
                  type="button"
                  onClick={() => onChange("")}
                  title="Tozalash"
                  className="shrink-0 p-1.5 rounded-lg bg-zinc-800 hover:bg-red-500 hover:text-white text-zinc-300 transition-colors"
                >
                  <X size={14} />
                </button>
              )}
              <input
                ref={fileInputRef}
                type="file"
                accept={accept}
                onChange={handleFileSelect}
                className="hidden"
              />
            </div>
            <div className="mt-1.5 flex items-center gap-2 min-h-[16px]">
              {isLoading && <span className="text-[9px] text-amber-500">Yuklanmoqda...</span>}
              {!isLoading && isPreviewableImage && (
                <>
                  <img
                    src={value}
                    alt="preview"
                    className="w-12 h-12 object-cover rounded-lg border border-zinc-800"
                    onError={(e) => {
                      e.target.style.display = "none";
                    }}

                  </span>
                </>
              )}
            </div>
          </div>
        );
      }
      // Dynamic floating emoji particles component
      function Effects({ active }) {
        const [particles, setParticles] = useState([]);
        useEffect(() => {
          if (!active) {
            setParticles([]);
            return;
          }
          const emojis = ["🍂", "🌸", "✨", "🥘", "☕", "🍊"];
          const initialParticles = Array.from({ length: 15 }).map((_, i) => ({
            id: i,
            x: Math.random() * 100,
            y: Math.random() * 100,
            size: Math.random() * 15 + 10,
            speedY: -(Math.random() * 0.5 + 0.2),
            speedX: Math.random() * 0.4 - 0.2,
            opacity: Math.random() * 0.5 + 0.3,
            emoji: emojis[Math.floor(Math.random() * emojis.length)],
          }));
          setParticles(initialParticles);
          const interval = setInterval(() => {
            setParticles((prev) =>
              prev.map((p) => {
                let nextY = p.y + p.speedY;
                let nextX = p.x + p.speedX;
                if (nextY < -10) {
                  nextY = 110;
                  nextX = Math.random() * 100;
                }
                if (nextX < -10 || nextX > 110) {
                  nextX = Math.random() * 100;
                }
                return { ...p, x: nextX, y: nextY };
              })
            );
          }, 40);
          return () => clearInterval(interval);
        }, [active]);
        if (!active) return null;
        return (
          <div className="fixed inset-0 pointer-events-none overflow-hidden z-40">
            {particles.map((p) => (
              <span
                key={p.id}
                className="absolute select-none transition-all duration-100 ease-linear"
                style={{
                  left: `${p.x}%`,
                  top: `${p.y}%`,
                  fontSize: `${p.size}px`,
                  opacity: p.opacity,
                  transform: `rotate(${p.y * 3}deg)`,
                }}
              >
                {p.emoji}
              </span>
            ))}
          </div>
        );
      }
      // Helper to display default placeholder image if URL fails

            onError={() => setFailed(true)}
          />
        );
      }
      // Custom premium SVG Area Chart component for dashboard analytics
      function SvgAreaChart({ data, labels }) {
        if (!data || data.length === 0) return <div className="text-zinc-500 text-xs py-10 text-center">Ma'lumot mavjud emas</div>;
        
        const max = Math.max(...data, 10);
        const width = 500;
        const height = 180;
        const paddingLeft = 35;
        const paddingRight = 15;
        const paddingTop = 15;
        const paddingBottom = 25;
        
        const chartWidth = width - paddingLeft - paddingRight;
        const chartHeight = height - paddingTop - paddingBottom;
        
        const points = data.map((val, index) => {
          const x = paddingLeft + (index / (data.length - 1)) * chartWidth;
          const y = paddingTop + chartHeight - (val / max) * chartHeight;
          return { x, y, val, label: labels[index] };
        });
        
        const linePath = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ');
        const areaPath = points.length > 0 
          ? `${linePath} L ${points[points.length - 1].x} ${paddingTop + chartHeight} L ${points[0].x} ${paddingTop + chartHeight} Z`
          : '';
        const [hoveredPoint, setHoveredPoint] = useState(null);
        return (
          <div className="relative w-full h-full bg-zinc-50 dark:bg-zinc-900/55 rounded-2xl p-4 border border-zinc-200 dark:border-zinc-800 shadow-sm">
            <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-auto">
              <defs>
                <linearGradient id="chartGrad" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stopColor="#f59e0b" stopOpacity="0.4" />
                  <stop offset="100%" stopColor="#f59e0b" stopOpacity="0.0" />
                </linearGradient>
              </defs>
              
              {/* Grid Lines */}
              {[0, 0.25, 0.5, 0.75, 1].map((ratio, i) => {
                const y = paddingTop + chartHeight * ratio;
                const val = Math.round(max * (1 - ratio));
                return (
                  <g key={i}>
                    <line x1={paddingLeft} y1={y} x2={width - paddingRight} y2={y} stroke="rgba(120,120,120,0.12)" strokeDasharray="3 3" />
                    <text x={paddingLeft - 8} y={y + 4} textAnchor="end" fill="#71717a" className="text-[8px] font-mono">{val}</text>
                  </g>
                );
              })}
              
              {/* Area */}
              {areaPath && <path d={areaPath} fill="url(#chartGrad)" />}
              
              {/* Line */}
              {linePath && <path d={linePath} fill="none" stroke="#f59e0b" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />}
              
              {/* Points */}
              {points.map((p, i) => (
                <circle 
                  key={i} 
                  cx={p.x} 
                  cy={p.y} 
                  r="3.5" 
                  fill="#f59e0b" 
                  stroke="#18181b" 
                  strokeWidth="1.5" 
                  className="cursor-pointer transition-all hover:scale-150"
                  onMouseEnter={() => setHoveredPoint(p)}
                  onMouseLeave={() => setHoveredPoint(null)}
                />
              ))}
              
              {/* X labels */}
              {points.map((p, i) => {
                if (points.length > 8 && i % 2 !== 0) return null;
                return (
                  <text key={i} x={p.x} y={height - 5} textAnchor="middle" fill="#71717a" className="text-[8px] font-mono">
                    {p.label}
                  </text>
                );
              })}
            </svg>
            {hoveredPoint && (
              <div 
                className="absolute bg-zinc-900 border border-zinc-800 text-[10px] text-white px-2 py-1 rounded-xl shadow-lg pointer-events-none"
                style={{ 
                  left: `${(hoveredPoint.x / width) * 100}%`, 
                  top: `${(hoveredPoint.y / height) * 100 - 30}%`,
                  transform: 'translateX(-50%)'
                }}
              >
                <span className="font-bold text-amber-400">{hoveredPoint.val}</span> ta ({hoveredPoint.label})
              </div>
            )}
          </div>
        );
      }

          e.preventDefault();
          const correctPassword = state.config.staffPassword || "1234";

            setIsAuthenticated(true);
            setAuthError("");

            setAuthError("Xato parol! Qayta urinib ko'ring yoki Admin bilan bog'laning.");
          }

        const logAction = async (actionText) => {
          const now = new Date();
          const timeStr = now.toLocaleTimeString("uz-UZ", { hour: "2-digit", minute: "2-digit" });
          const logEntry = {
            id: Math.random().toString(),
            time: timeStr,
            action: actionText,
          };
          const updatedStats = {
            ...state.stats,
            ordersLog: [logEntry, ...(state.stats.ordersLog || [])].slice(0, 50),
          };
          await onUpdateState({ stats: updatedStats });
        };
        const adjustStock = async (itemId, delta) => {
          const updatedMenu = state.menu.map((item) => {
            if (item.id === itemId) {
              const newStock = Math.max(0, item.stock + delta);
              const actionText = delta > 0
                ? `${item.category}: ${item.name} zaxirasi ${item.stock} dan ${newStock} ga oshirildi (${selectedRole === 'chef' ? 'Oshpaz' : 'Afitsiant'} tomonidan)`
                : `${item.category}: ${item.name} zaxirasi ${item.stock} dan ${newStock} ga kamaytirildi (Afitsiant stol buyurtmasi)`;
              logAction(actionText);
              return { ...item, stock: newStock };
            }
            return item;
          });
          await onUpdateState({ menu: updatedMenu });
        };
        const restoreStock = async (itemId) => {
          const updatedMenu = state.menu.map((item) => {
            if (item.id === itemId) {
              const actionText = `${item.category}: ${item.name} zaxirasi to'ldirildi (Mavjud: 30 ta)`;
              logAction(actionText);
              return { ...item, stock: 30 };
            }
            return item;
          });
          await onUpdateState({ menu: updatedMenu });
        };
        const handleSaveEdit = async () => {
          if (!editingItem) return;
          const updatedMenu = state.menu.map((item) => {
            if (item.id === editingItem.id) {
              logAction(`${item.category}: ${item.name} ma'lumotlari yangilandi (${selectedRole === 'chef' ? 'Oshpaz' : 'Afitsiant'} tomonidan)`);
              return {
                ...item,
                name: editName,
                description: editDesc,
                voiceText: editVoiceText,
              };
            }
            return item;
          });
          await onUpdateState({ menu: updatedMenu });
          setEditingItem(null);
        };
        const filteredMenu = state.menu.filter((item) => {
          const query = searchQuery.toLowerCase().trim();
          if (!query) return true;
          return (
            item.name.toLowerCase().includes(query) ||
            item.category.toLowerCase().includes(query)
          );
        });
        if (!isAuthenticated) {
          return (
            <div className="min-h-screen bg-zinc-950 flex flex-col items-center justify-center p-4 text-white">

        const [translateError, setTranslateError] = useState("");
        const handleLogin = (e) => {
          e.preventDefault();

            setAuthError("Xato admin paroli! Qayta urinib ko'ring.");

        const handleSaveConfig = async () => {

            theme: themeInput,

            backgroundValue: bgValue,

            logoWidth: Number(logoWidthInput),

        // CRUD Operations
        const handleAddFood = async () => {

            id: Math.random().toString(),

            stock: Number(foodStock),
            rating: Number(foodRating),
            voiceText: foodVoiceText || `${foodName}. Narxi ${Number(foodPrice).toLocaleString()} so'm.`,

          const updatedMenu = [...state.menu, newFood];

          setIsAddingFood(false);
          resetFoodForm();
        };
        const handleSaveEditFood = async () => {
          if (!editingFood) return;
          const updatedMenu = state.menu.map((item) => {
            if (item.id === editingFood.id) {
              return {
                ...item,
                name: foodName,
                category: foodCategory,
                description: foodDesc,
                price: Number(foodPrice),
                image: foodImage,
                stock: Number(foodStock),
                rating: Number(foodRating),

          setFoodCategory("");

        // Guide Booklet operations
        const handleSaveBooklet = async () => {

            active: bookletActive,

          };
          await onUpdateState({ booklet: updatedBooklet });

        const handleAddBookletPage = () => {
          if (!newBookletPageText.trim()) return;
          setBookletPagesList([...bookletPagesList, newBookletPageText.trim()]);
          setNewBookletPageText("");
        };

          setBookletPagesList(bookletPagesList.filter((_, i) => i !== index));
        };
        // Advertisement operations
        const handleUpdateAd = async (adId, fields) => {
          const updatedAds = adsList.map((ad) => {
            if (ad.id === adId) {
              return { ...ad, ...fields };
            }
            return ad;
          });
          setAdsList(updatedAds);
          await onUpdateState({ ads: updatedAds });

        // Database reset/import/export handlers

          if (!confirm("Baza dastlabki zavod sozlamalariga qaytariladi. Davom etilsinmi?")) return;
          localStorage.removeItem("oshxona_crm_state");
          window.location.reload();

        const handleExportDb = () => {
          const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state, null, 2));
          const dlAnchorElem = document.createElement('a');
          dlAnchorElem.setAttribute("href", dataStr);
          dlAnchorElem.setAttribute("download", "db.json");
          dlAnchorElem.click();
        };
        const handleImportDb = (e) => {
          const file = e.target.files?.[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = async (event) => {
            try {
              const importedData = JSON.parse(event.target.result);
              if (importedData.menu && importedData.config) {
                await onUpdateState(importedData);
                alert("Ma'lumotlar bazasi muvaffaqiyatli yuklandi! 📂");
                window.location.reload();

                alert("Fayl formati mos kelmadi!");

          reader.readAsText(file);

              newTrans[key] = await translateWithGoogle(referenceTranslations[key], code, "uz");

            const updatedTranslations = {
              ...state.translations,
              [code]: newTrans,
            };
            const updatedLanguages = Array.from(new Set([...state.languages, code]));
            const translatedMenu = await Promise.all(
              state.menu.map(async (item) => {
                const newVoice = await translateWithGoogle(item.voiceText || item.name, code, "uz");
                return { ...item, voiceText: newVoice };
              })
            );
            await onUpdateState({
              translations: updatedTranslations,
              languages: updatedLanguages,
              menu: translatedMenu,
            });
            alert(`Tizimga yangi (${code.toUpperCase()}) tili qo'shildi va avtomatik tarjima qilindi! 🌐`);
            setNewLangCode("");

            setTranslateError("Tarjima qilish jarayonida xatolik yuz berdi.");

            setIsTranslating(false);
          }

                      <h4 className="text-xs font-bold text-red-500">Xavfli zona (Factory reset)</h4>
                      <p className="text-[10px] text-zinc-400 mt-1">
                        Dasturni o'rnatilgan birinchi (boshlang'ich) holatiga qaytaradi. Kiritilgan barcha o'zgarishlar o'chib ketadi.
                      </p>
                      <button
                        onClick={handleResetDb}
                        className="mt-3 px-4 py-2 bg-red-600 hover:bg-red-700 text-white text-xs font-bold rounded-xl transition-colors"
                      >
                        Tizimni dastlabki holatga qaytarish
                      </button>
                    </div>
                  </div>
                )}
              </div>
            </main>
          </div>
        );
      }
      // MAIN APP COORDINATOR
      function App() {
        const [state, setState] = useState(null);
        const [activePanel, setActivePanel] = useState("user");
        const [loading, setLoading] = useState(true);
        const [error, setError] = useState("");
        const [isPlayingAudio, setIsPlayingAudio] = useState(false);
        const [audioError, setAudioError] = useState("");
        const loadInitialState = () => {
          try {
            const saved = localStorage.getItem("oshxona_crm_state");
            if (saved) {
              const parsed = JSON.parse(saved);
              setState(parsed);
              applyTheme(parsed.config.theme);
            } else {
              setState(DEFAULT_STATE);
              applyTheme(DEFAULT_STATE.config.theme);
              localStorage.setItem("oshxona_crm_state", JSON.stringify(DEFAULT_STATE));
            }
          } catch (e) {
            console.error("Local storage read error, fallback to embedded state", e);
            setState(DEFAULT_STATE);
            applyTheme(DEFAULT_STATE.config.theme);
          } finally {
            setLoading(false);
          }
        };
        const logVisit = async (currentState) => {
          if (!currentState) return;
          try {
            const now = new Date();
            const timeStr = now.toLocaleTimeString("uz-UZ", { hour: "2-digit", minute: "2-digit" });
            const logEntry = { time: timeStr, type: "Kirish", user: "Mehmon (Mobil)" };
            const updatedStats = {
              ...currentState.stats,
              visitsLog: [logEntry, ...(currentState.stats.visitsLog || [])].slice(0, 50),
              totalVisits: (currentState.stats.totalVisits || 0) + 1,
              activeUsers: Math.max(1, (currentState.stats.activeUsers || 0) + 1)
            };
            const lastHourIdx = updatedStats.hourlyVisits.length - 1;
            updatedStats.hourlyVisits[lastHourIdx] = (updatedStats.hourlyVisits[lastHourIdx] || 0) + 1;
            const newState = { ...currentState, stats: updatedStats };
            setState(newState);
            localStorage.setItem("oshxona_crm_state", JSON.stringify(newState));
          } catch (e) {
            console.error("Error logging visit", e);
          }
        };
        useEffect(() => {
          loadInitialState();
        }, []);
        useEffect(() => {
          if (state && loading === false) {
            const visitLogged = sessionStorage.getItem("visit_logged");
            if (!visitLogged) {
              logVisit(state);
              sessionStorage.setItem("visit_logged", "true");
            }
          }
        }, [loading]);
        const applyTheme = (theme) => {
          if (theme === "dark") {
            document.documentElement.classList.add("dark");
          } else {
            document.documentElement.classList.remove("dark");
          }
        };
        const handleUpdateState = async (updatedFields) => {
          if (!state) return;
          const newState = { ...state, ...updatedFields };
          setState(newState);
          localStorage.setItem("oshxona_crm_state", JSON.stringify(newState));
        };
        const handleSetTheme = async (theme) => {
          if (!state) return;
          applyTheme(theme);
          const updatedConfig = { ...state.config, theme };
          await handleUpdateState({ config: updatedConfig });
        };
        const handleSetLang = async (lang) => {
          if (!state) return;
          const updatedConfig = { ...state.config, activeLang: lang };
          await handleUpdateState({ config: updatedConfig });
        };
        const playTTS = (item) => {
          if (isPlayingAudio) {
            window.speechSynthesis?.cancel();
            setIsPlayingAudio(false);
            return;
          }
          setIsPlayingAudio(true);
          setAudioError("");
          const textToSpeak = item.voiceText || `${item.name}. Narxi ${item.price.toLocaleString()} so'm.`;
          if (!window.speechSynthesis) {
            setAudioError("Ushbu brauzerda ovozli eshittirish tizimi ishlamaydi.");
            setIsPlayingAudio(false);
            return;
          }
          window.speechSynthesis.cancel();
          const utterance = new SpeechSynthesisUtterance(textToSpeak);
          
          const activeLanguageCode = state.config.activeLang || "uz";
          if (activeLanguageCode === "uz") {
            utterance.lang = "tr-TR";
          } else if (activeLanguageCode === "ru") {
            utterance.lang = "ru-RU";
          } else {
            utterance.lang = "en-US";
          }
          
          utterance.rate = 0.9;
          
          utterance.onend = () => setIsPlayingAudio(false);
          utterance.onerror = () => {
            setAudioError("Ovoz tizimida xatolik yuz berdi.");
            setIsPlayingAudio(false);
          };
          window.speechSynthesis.speak(utterance);
        };
        if (loading) {
          return (
            <div className="min-h-screen bg-zinc-950 flex flex-col items-center justify-center p-4 text-white">
              <div className="flex flex-col items-center gap-4">
                <RefreshCw className="w-10 h-10 text-amber-500 animate-spin" />
                <h2 className="text-sm font-bold tracking-widest uppercase text-zinc-400">
                  Lazzat CRM Yuklanmoqda...
                </h2>
              </div>
            </div>
          );
        }
        if (error || !state) {
          return (
            <div className="min-h-screen bg-zinc-950 flex flex-col items-center justify-center p-4 text-white">
              <div className="max-w-md w-full bg-zinc-900 border border-zinc-800 p-6 rounded-2xl flex flex-col items-center text-center gap-4">
                <AlertCircle className="w-12 h-12 text-red-500" />
                <h2 className="text-lg font-bold">Xatolik yuz berdi</h2>
                <p className="text-sm text-zinc-400">{error || "Tizim yuklanishida xatolik."}</p>
                <button
                  onClick={() => {
                    setLoading(true);
                    setError("");
                    loadInitialState();
                  }}
                  className="px-4 py-2 bg-amber-500 text-black text-xs font-bold rounded-xl hover:bg-amber-600 transition-colors"
                >
                  Qayta yuklash 🔄
                </button>
              </div>
            </div>
          );
        }
        const activeLang = state.config.activeLang || "uz";
        const t = state.translations[activeLang] || state.translations["uz"];
        const bgType = state.config.backgroundType;
        const bgValue = state.config.backgroundValue;
        return (
          <div className="relative min-h-screen w-full overflow-x-hidden font-sans text-zinc-800 dark:text-zinc-100 transition-colors duration-200">
            <div className="fixed inset-0 -z-50 pointer-events-none overflow-hidden bg-zinc-100 dark:bg-zinc-950">
              {bgType === "color" && (
                <div className="w-full h-full" style={{ backgroundColor: bgValue }} />
              )}
              {bgType === "image" && (
                <div
                  className="w-full h-full bg-cover bg-center transition-all duration-500"
                  style={{ backgroundImage: `url(${bgValue})` }}
                >
                  <div className="w-full h-full bg-white/85 dark:bg-zinc-950/85 backdrop-blur-xs" />
                </div>
              )}
              {bgType === "gif" && (
                <div
                  className="w-full h-full bg-cover bg-center transition-all duration-500"
                  style={{ backgroundImage: `url(${bgValue})` }}
                >
                  <div className="w-full h-full bg-white/75 dark:bg-zinc-950/75 backdrop-blur-xs" />
                </div>
              )}
              {bgType === "video" && (
                <div className="relative w-full h-full">
                  <video
                    src={bgValue}
                    autoPlay
                    loop
                    muted
                    playsInline
                    className="w-full h-full object-cover opacity-30 dark:opacity-20"
                  />
                  <div className="absolute inset-0 bg-white/80 dark:bg-zinc-950/80 backdrop-blur-xs" />
                </div>
              )}
            </div>
            <Effects active={state.config.effectsEnabled} />
            <div className="w-full h-full">
              {activePanel === "user" && (
                <FoydalanuvchiPanel
                  state={state}
                  t={t}
                  onPanelChange={setActivePanel}
                  onSetTheme={handleSetTheme}
                  onSetLang={handleSetLang}
                  onPlayTTS={playTTS}
                  isPlayingAudio={isPlayingAudio}
                  audioError={audioError}
                />
              )}
              {activePanel === "staff" && (
                <StaffPanel
                  state={state}
                  t={t}
                  onUpdateState={handleUpdateState}
                  onBackToMenu={() => setActivePanel("user")}
                />
              )}
              {activePanel === "admin" && (
                <AdminPanel
                  state={state}
                  t={t}
                  onUpdateState={handleUpdateState}
                  onBackToMenu={() => setActivePanel("user")}
                />
              )}
            </div>
          </div>
        );
      }
      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
